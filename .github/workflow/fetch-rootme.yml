name: Fetch Root Me Profile

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Root Me API
        run: |
          curl -s \
            -b "api_key=${{ secrets.ROOTME_API_KEY }}" \
            "https://api.www.root-me.org/auteurs/893032" \
            -o profile.json

      - name: Commit & push profile.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile.json
          git diff --cached --quiet || git commit -m "chore: update Root Me profile [skip ci]"
          git push