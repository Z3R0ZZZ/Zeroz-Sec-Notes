name: Fetch Profiles

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-profiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Root Me profile
        run: |
          curl -s \
            -b "api_key=${{ secrets.ROOTME_API_KEY }}" \
            "https://api.www.root-me.org/auteurs/893032" \
            -o profile_rootme.json

      - name: Fetch Root Me challenge totals per category
        env:
          ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, os

          RUBRIQUES = {
            "16": "Web - Client",
            "17": "Programmation",
            "18": "Cryptanalyse",
            "67": "Stéganographie",
            "68": "Web - Serveur",
            "69": "Cracking",
            "70": "Réaliste",
            "182": "Réseau",
            "189": "App - Script",
            "203": "App - Système",
            "208": "Forensic",
          }

          api_key = os.environ["ROOTME_API_KEY"]
          totals = {}

          for rid, name in RUBRIQUES.items():
            url = f"https://api.www.root-me.org/challenges?id_rubrique={rid}&limit=1000"
            req = urllib.request.Request(url, headers={"Cookie": f"api_key={api_key}"})
            try:
              with urllib.request.urlopen(req, timeout=15) as r:
                data = json.loads(r.read())
                count = len(data) if isinstance(data, list) else 0
                totals[rid] = {"name": name, "total": count}
                print(f"{name}: {count}")
            except Exception as e:
              print(f"Erreur {name}: {e}")
              totals[rid] = {"name": name, "total": 0}

          with open("profile_rootme_totals.json", "w") as f:
            json.dump(totals, f)
          PYEOF

      - name: Fetch HackTheBox basic profile
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.HTB_API_KEY }}" \
            -H "Accept: application/json" \
            "https://labs.hackthebox.com/api/v4/user/profile/basic/2084386" \
            -o profile_htb_basic.json

      - name: Fetch HackTheBox activity (v5)
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.HTB_API_KEY }}" \
            -H "Accept: application/json" \
            "https://labs.hackthebox.com/api/v5/user/profile/activity/2084386" \
            -o profile_htb_activity.json

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile_rootme.json profile_rootme_totals.json profile_htb_basic.json profile_htb_activity.json
          git diff --cached --quiet || git commit -m "chore: update profiles [skip ci]"
          git push