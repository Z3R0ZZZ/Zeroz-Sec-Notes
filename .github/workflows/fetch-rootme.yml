name: Fetch Profiles

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-profiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Root Me profile
        run: |
          curl -s \
            -b "api_key=${{ secrets.ROOTME_API_KEY }}" \
            "https://api.www.root-me.org/auteurs/893032" \
            -o profile_rootme.json

      - name: Fetch Root Me score by category
        run: |
          curl -s \
            -b "api_key=${{ secrets.ROOTME_API_KEY }}" \
            "https://api.www.root-me.org/auteurs?nom=ZeroZ&lang=fr" \
            -o profile_rootme_score.json

      - name: Fetch HackTheBox basic profile
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.HTB_API_KEY }}" \
            -H "Accept: application/json" \
            "https://labs.hackthebox.com/api/v4/user/profile/basic/2084386" \
            -o profile_htb_basic.json

      - name: Fetch HackTheBox activity
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.HTB_API_KEY }}" \
            -H "Accept: application/json" \
            "https://labs.hackthebox.com/api/v5/user/profile/activity/2084386" \
            -o profile_htb_activity.json

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile_rootme.json profile_rootme_score.json profile_htb_basic.json profile_htb_activity.json
          git diff --cached --quiet || git commit -m "chore: update profiles [skip ci]"
          git push